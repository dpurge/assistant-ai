# Skill evaluation test manifest.
# paths relative to project root
skill_root: content/skills

cases:
  # ── TEMPLATE: phraseforge language skills ──────────────────────────
  - id: "phraseforge-lang-{code}"
    template: true
    skills:
      - phraseforge-core
      - "phraseforge-lang-{code}"
    prompt: |
      Extract a vocabulary list from the text following the language skill's rules.
      Each entry: headword (dictionary form), grammar tag, Polish translation (multiple
      senses joined with '; '), and transcription for non-Latin scripts.
      Output JSON only matching this shape: {"title": "...", "lang": "...", "vocabulary": [...], "models": [...]}
    message: |
      Create a vocabulary list for basic greetings in {language_name}: hello, goodbye,
      thank you, please, yes, no. Follow phraseforge-core and phraseforge-lang-{code} skill instructions exactly.
    golden: '{"title": "Basic Greetings", "lang": "{code}", "vocabulary": [...3 entries...], "models": [...1 entry...]}'
    variables:
      - code: apc
        language_name: "Levantine Arabic"
        golden: '{"title":"Basic Greetings","lang":"apc","vocabulary":[{"headword":"مَرْحَبَا","grammar":"Interj","transcription":"marḥabā","translation":"cześć"},{"headword":"مَعَ السَّلَامَة","grammar":"Phrase","transcription":"maʿa s-salāma","translation":"do widzenia"},{"headword":"شُكْرًا","grammar":"Interj","transcription":"šukran","translation":"dziękuję"}],"models":[{"pattern":"كِيفَك؟","transcription":"kīfak?","translation":"Jak się masz?"}]}'
