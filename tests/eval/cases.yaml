  # ── phraseforge-core standalone ──────────────────────────────────────
  - id: phraseforge-core
    skills:
      - phraseforge-core
    prompt: |
      You are a language lesson author. Given a topic, produce a Lesson JSON following
      the phraseforge-core skill instructions exactly.
      Output JSON only: {"title": "...", "lang": "lat", "vocabulary": [...], "models": [...]}
    message: |
      Create a minimal Latin lesson about the word "amor" (love).
      Include 3 vocabulary entries and 1 model phrase.
    golden: '{"title": "Amor","lang": "lat","vocabulary": [{"headword": "amor","grammar": "N m","translation": "miłość"},{"headword": "amare","grammar": "V","translation": "kochać"},{"headword": "amicus","grammar": "N m","translation": "przyjaciel"}],"models": [{"pattern": "Te amo.","translation": "Kocham cię."}]}'

  # ── research-core ─────────────────────────────────────────────────────
  - id: research-core
    skills:
      - research-core
    prompt: |
      Write a Markdown research report following the report shape from the research-core skill:
      Title, Summary (~80 words), Body (H2 per subtopic, prose), Open questions, References.
      Output Markdown only.
    message: |
      Write a brief research report on the fall of the Roman Republic.
      Include at least 2 subtopics and a references section.
    golden: |
      # The Fall of the Roman Republic

      ## Summary

      The Roman Republic collapsed between 133 and 27 BCE due to political instability,
      civil wars, and the rise of military strongmen. Social tensions from inequality,
      slave labor competition, and political corruption weakened republican institutions.
      Julius Caesar's crossing of the Rubicon in 49 BCE and subsequent assassination
      in 44 BCE accelerated the final transition to the Principate under Augustus.

      ## Political Instability

      The Gracchi brothers attempted reforms that alienated the Senate.

      ## Civil Wars

      Marius and Sulla, then Caesar and Pompey, divided Rome.

      ## Open Questions

      - Could the Republic have survived with earlier reforms?

      ## References

      - [wiki:Roman_Republic]

